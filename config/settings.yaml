model:
  name: "microsoft/Phi-4-mini-instruct"
  max_new_tokens: 512
  temperature: 0.3

embedding:
  deployment: "text-embedding-3-large"
  dimensions: 3072

search:
  index_name: "pubmedqa-index"
  top_k: 5
  semantic_config: "pubmedqa-semantic"

data:
  dataset_name: "qiaojin/PubMedQA"
  dataset_split: "pqa_labeled"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  processed_file: "pubmedqa_processed.jsonl"
  train_count: 800
  eval_count: 200

evaluation:
  eval_samples: 200
  metrics:
    - groundedness
    - relevance
    - response_completeness

judge:
  chat_deployment: "gpt-54"
  temperature: 0.0
  max_tokens: 2048
  rubric_dimensions:
    - medical_accuracy
    - faithfulness
    - completeness
    - clarity

rl_loop:
  iterations: 3
  questions_per_iteration: 800
  data_policy: "on_policy"
  convergence_threshold: 0.01

training:
  lora_rank: 16
  lora_alpha: 32
  lora_target_modules:
    - "q_proj"
    - "v_proj"
  quantization_bits: 4
  dpo_beta: 0.1
  learning_rate: 5.0e-5
  num_epochs: 3
  per_device_batch_size: 4

cosmos:
  database: "rag-feedback"
  container: "judge-results"
